<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/getUser.js" defer></script>
    <title>GitHub Users Viewer</title>
       <link rel="stylesheet" href="style.css">
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>
<body>
    <main>
        <div id="title-container">
            <h1><img src="/media/github.png" > GitHub Users <span style="color: rgb(34, 34, 165);">Viewer</span></h1>
            <p> Fetch data from the gitHub Api and display users dynamically</p>
          
        </div>
        <hr style="width: 95%;">

        <div id="task-container">
            <h1>🎯Your Task</h1>
            <ul>
                <li><i class="fa-solid fa-check"></i>Fetch users form <a href="https://api.github.com/users">https://api.github.com/users</a></li>
                <li>  <i class="fa-solid fa-check"></i>Display each user's avatar , username , and profile link</li>
                <li><i class="fa-solid fa-check"></i>Show the data inside beautiful user card (first 10 users)</li>
            </ul>
        </div>
        <div id="button-container"> 
            <button id="loading-btn" type="button">O  Loading users....</button>

         <div class="divider-container">
  <hr class="line">
  <p class="mid-text">Users will appear here</p>
</div>
        </div>

        <div id="user-container">
        
        </div>
    </main>
